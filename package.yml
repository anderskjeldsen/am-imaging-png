
id: am-imaging-png
version: 1.0.0
type: library
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
#    branch: master
    url: https://github.com/anderskjeldsen/am-lang-core.git
  - id: am-imaging
    realm: github
    type: git-repo
    tag: latest
#    branch: master
    url: https://github.com/anderskjeldsen/am-imaging.git
platforms:
  - id: libc
    abstract: true
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc -O3
    asmCommand: vasmm68k_mot
    gccAdditionalLibraries:
      - socket
      - png
      - z
      - m
    additionalHeaders:
    additionalAsmSources:
    additionalCSources:
    additionalIncludePaths:
    gccAdditionalOptions:
      - -noixemul     
    gccLibraryPaths:
      - c-libs/libpng15/lib
      - c-libs/zlib/nofpu/lib
  - id: macos-arm
    extends: libc
    gccCommand: gcc
    gccAdditionalLibraries:
      - png16
    additionalHeaders:
    additionalAsmSources:
    additionalCSources:
    additionalIncludePaths:
      - /opt/homebrew/include
#    gccAdditionalOptions:
#      - -L /opt/homebrew/lib
#      - -l png
    gccLibraryPaths:
      - /opt/homebrew/lib
  - id: linux-x64
    extends: libc
    gccCommand: gcc
    # libpng must be on the link line (GNU ld: an object referencing
    # png_set_sig_bytes needs -lpng16 explicitly, or the link fails with
    # "DSO missing from command line"). gccAdditionalLibraries places the
    # -l flag after the objects, which is what GNU ld's link ordering wants.
    gccAdditionalLibraries:
      - png16
  - id: linux-ppc32
    extends: libc
    gccCommand: powerpc-linux-gnu-gcc -O1
    gccAdditionalOptions:
      - -pthread
    gccAdditionalLibraries:
      - png16
    additionalHeaders:
    additionalAsmSources:
    additionalCSources:
    additionalIncludePaths:
    gccLibraryPaths:
  - id: linux-ppc64
    extends: linux-ppc32
    gccCommand: powerpc-linux-gnu-gcc -O2
  - id: morphos-ppc
    extends: libc
    gccCommand: ppc-morphos-gcc -O3
    # MorphOS ships libpng as png.library (a shared-library wrapper
    # around libpng 1.2.59). Defining __MORPHOS_SHAREDLIBS in the
    # bundled <png.h> wrapper switches it from `#include_next <png.h>`
    # (which would look for a host libpng we don't have) to the
    # PNGBase-dispatched API; -lpng_shared and -lz_shared then resolve
    # the stubs to png.library / z.library calls.
    gccAdditionalLibraries:
      - png_shared
      - z_shared
      - m
    additionalHeaders:
    additionalAsmSources:
    additionalCSources:
    additionalIncludePaths:
    gccAdditionalOptions:
      - -noixemul
      - -D__MORPHOS_SHAREDLIBS
    gccLibraryPaths:

buildTargets:
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
  - id: amigaos_docker_arm
    platform: amigaos
    dockerBuild:
      image: kjeldsenanders/dnf-dev:initial
      buildPath: /host
  - id: macos-arm
    platform: macos-arm
    commands:
      - make -f macos-arm.Makefile all
  - id: linux-x64
    platform: linux-x64
